<!DOCTYPE html>
<html>
<head>
  <title>OJT Training Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    .kpi-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .kpi {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .chart-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    #data {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h1>📊 OJT Training Dashboard</h1>

<div class="kpi-container">
  <div class="kpi">
    <h3>Total Batches</h3>
    <h2 id="totalBatches">0</h2>
  </div>
  <div class="kpi">
    <h3>Total Headcount</h3>
    <h2 id="totalHC">0</h2>
  </div>
  <div class="kpi">
    <h3>Avg Attrition %</h3>
    <h2 id="avgAttrition">0%</h2>
  </div>
</div>

<div class="chart-container">
  <canvas id="trainerChart"></canvas>
</div>

<h2>Batch Details</h2>
<div id="data"></div>

<script src="app.js"></script>

</body>
</html>
