<!DOCTYPE html>
<html>
<head>
  <title>OJT Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#f5f6fa; margin:20px; }

    h1 { text-align:center; }

    .filters {
      display:flex;
      gap:10px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    select {
      padding:8px;
      border-radius:6px;
    }

    .kpi-container {
      display:flex;
      gap:20px;
      margin-bottom:20px;
    }

    .kpi {
      flex:1;
      background:white;
      padding:15px;
      border-radius:10px;
      text-align:center;
    }

    .chart-container {
      background:white;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
    }

    #data {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:15px;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>📊 OJT Training Dashboard</h1>

<!-- FILTERS -->
<div class="filters">
  <select id="monthFilter"></select>
  <select id="trainerFilter"></select>
  <select id="processFilter"></select>
  <select id="batchFilter"></select>
</div>

<!-- KPI -->
<div class="kpi-container">
  <div class="kpi"><h3>Total Batches</h3><h2 id="totalBatches"></h2></div>
  <div class="kpi"><h3>Total HC</h3><h2 id="totalHC"></h2></div>
  <div class="kpi"><h3>Avg Attrition</h3><h2 id="avgAttrition"></h2></div>
</div>

<!-- CHARTS -->
<div class="chart-container"><canvas id="trainerChart"></canvas></div>
<div class="chart-container"><canvas id="attritionChart"></canvas></div>

<h2>Batch Details</h2>
<div id="data"></div>

<script src="app.js"></script>

</body>
</html>
